[global]
   workgroup = WORKGROUP
   server string = Ubuntu Target Server
   smb ports = 4445 1399
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   server role = standalone server
   obey pam restrictions = yes
   unix password sync = yes
   map to guest = bad user
   usershare allow guests = yes

[public]
   comment = Public Anonymous Share
   path = /srv/samba/share
   browsable = yes
   writable = yes
   guest ok = yes
   read only = no
   force user = tonystark

[homes]
   comment = Home Directories
   browseable = no
   writable = yes
   guest ok = no
   valid users = %S
   create mask = 0700
   directory mask = 0700
